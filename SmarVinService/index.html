<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СМАРТВИН | Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            color: #f0f0f0;
            background: url('i.webp') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 10, 30, 0.75);
            z-index: 0;
            pointer-events: none;
        }
        .floating-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .floating-dots span {
            position: absolute;
            display: block;
            width: 6px;
            height: 6px;
            background: rgba(180, 130, 255, 0.2);
            border-radius: 50%;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
        .container {
            position: relative;
            z-index: 2;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(30, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(200, 150, 255, 0.15);
            animation: fadeIn 1s ease-out;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #d0b0ff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.2rem;
            padding: 8px 16px;
            border-radius: 40px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .nav a:hover, .nav a.active {
            background: rgba(160, 100, 255, 0.2);
            border-color: #a06aff;
            color: white;
        }
        .main-title {
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #d0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
            text-align: center;
        }
        .sub-title {
            font-size: 2rem;
            font-weight: 500;
            color: #c9a9ff;
            margin-bottom: 40px;
            text-align: center;
        }
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .greeting-hero {
            font-size: 1.5rem;
            margin: 40px 0;
            background: rgba(140, 80, 220, 0.2);
            padding: 20px 30px;
            border-radius: 60px;
            border-left: 5px solid #a06aff;
            max-width: 700px;
        }
        .address-block {
            margin-top: 40px;
            padding: 30px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            border: 1px solid rgba(200,150,255,0.2);
        }
        .address-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.3rem;
            margin: 15px 0;
            justify-content: center;
        }
        .address-item i {
            color: #b57cff;
            font-size: 1.8rem;
            width: 40px;
        }
        .work-hours {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
            font-size: 1.2rem;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #8a4dff, #b57cff);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.3rem;
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 25px rgba(138, 77, 255, 0.4);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(138, 77, 255, 0.7);
        }
        @media (max-width: 700px) {
            .main-title { font-size: 3rem; }
            .sub-title { font-size: 1.5rem; }
            .card { padding: 30px 20px; }
            .address-item { font-size: 1rem; flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="floating-dots" id="floatingDots"></div>
    <div class="container">
        <div class="card">
            <div class="nav">
                <a href="index.html" class="active">Главная</a>
                <a href="about.html">О нас</a>
                <a href="services.html">Услуги</a>
                <a href="contacts.html">Контакты</a>
            </div>
            
            <div class="hero">
                <h1 class="main-title">СМАРТВИН</h1>
                <div class="sub-title">⚡ Экспресс ремонт</div>
                
                <div class="greeting-hero">
                    <i class="fas fa-hand-peace"></i> Ваш девайс в надёжных руках
                </div>
                
                <div class="address-block">
                    <div class="address-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>г. Томск, пер. Дербышевский д.26Б, 1 этаж (вход в «Мои Документы»)</span>
                    </div>
                    <div class="work-hours">
                        <span><i class="far fa-clock"></i> ПН-СБ 11:00–19:30</span>
                        <span><i class="far fa-clock"></i> ВС 11:00–18:00</span>
                    </div>
                    <a href="services.html" class="btn">Наши услуги <i class="fas fa-arrow-right"></i></a>
                </div>
            </div>
        </div>
    </div>
    <script>
        const dotsContainer = document.getElementById('floatingDots');
        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('span');
            const size = Math.floor(Math.random() * 12 + 4);
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            dot.style.animationDelay = Math.random() * 10 + 's';
            dot.style.animationDuration = Math.floor(Math.random() * 25 + 15) + 's';
            dot.style.background = `rgba(180, 130, 255, ${Math.random() * 0.3 + 0.1})`;
            dotsContainer.appendChild(dot);
        }
    </script>
</body>
</html>
